version: 5.1.3

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgress
      - DB_PASSWORD=postgress
      - DB_DATABASE=postgress
    ports:
      - 8080:8080
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgress
      - POSTGRES_PASSWORD=postgress
      - POSTGRES_DB=postgress
    ports:
      - "5432:5432"