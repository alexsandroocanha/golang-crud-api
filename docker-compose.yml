version: "3.9"

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=example
      - DB_DATABASE=mydb
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    
  postgres-db:
    image: postgres:16
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
