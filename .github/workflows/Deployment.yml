name: Deployment

on:
  push:
    branches: ["main"]
jobs:

  build:
    runs-on: ubuntu-latest
    environment: NEXUS
    steps:
    - uses: actions/checkout@v4
    
    # - name: Set up Go
    #   uses: actions/setup-go@v4
    #   with:
    #     go-version: '1.26.2'

    - name: Login Nexus from docker
      uses: docker/login-action@v4
      with:
          registry: http://177.44.217.233:8082
          username: ${{ secrets.NEXUS_USER }}
          password: ${{ secrets.NEXUS_PASSWORD }}
          
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.dev
        push: true
        tags: ${{ secrets.NEXUS_HOST }}:${{ secrets.NEXUS_PORT }}/api-golang:${{ github.sha }}
