name: Deployment

on: 
    pull_request:
        branches: ["main"]
    merge_group:
        types: checks_requested
jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.2'

    - name: Build image
      run: docker build -f Dockerfile.dev .

