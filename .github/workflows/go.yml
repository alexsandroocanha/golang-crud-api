name: Deployment

on:
  push:
    branches: ["main"]
jobs:

  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.NEXUS_HOST }}:${{ secrets.NEXUS_PORT }}/api-golang:${{ github.sha }}
    steps:
    
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.2'

    - name: Login Nexus from docker
      uses: docker/login-action@v4
      with:
          registry: ${{ secrets.NEXUS_HOST }}:${{ secrets.NEXUS_PORT }}
          username: ${{ secrets.NEXUS_USER }}
          password: ${{ secrets.NEXUS_PASSWORD }}

          
    - name: Build image
      run: docker build -f Dockerfile.dev -t $IMAGE .

    - name: Push docker image from Nexus
      run: docker push $IMAGE
